server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # proxy para o backend
    location /api/ {
        proxy_pass http://order-generator:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
